name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build release package
        run: ./scripts/package.sh

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: WakeSamurai
          path: |
            dist/Wake Samurai.app
            dist/WakeSamurai.dmg
